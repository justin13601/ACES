name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "release/*", "dev"]

jobs:
  run_tests_ubuntu:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup package
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: >
          uv run pytest -v --cov=src

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  run_tests_min_deps:
    # Verifies that the lower bounds declared in pyproject.toml are actually installable
    # and pass the test suite. Keeps us honest about the floor advertised in metadata.
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install at minimum-direct versions
        run: |
          uv sync --group dev --resolution lowest-direct

      - name: Run tests
        run: |
          uv run --group dev --resolution lowest-direct pytest -v
